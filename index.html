<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words API</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        
        <h1>WORDS API</h1>

        <p>With this API we can get definitions, synonyms,
            antonyms and everything related to english language. Try it!</p>

        <p class="warning">Please note that not all word-operation combinations have an answer.</p>

        <label>Choose a word:</label>
        <input type="text" id="palabra" required>

        <label>Choose an operation:</label>
        <select id="opciones">
            <option value="showall">Show all</option>
            <option value="definitions">Definitions</option>
            <option value="synonyms">Synonyms</option>
            <option value="antonyms">Antonyms</option>
            <option value="examples">Examples</option>
            <option value="rhymes">Rhymes</option>
            <option value="frequency">Frequency</option>
            <option value="typeOf">Is A Type Of</option>
            <option value="similarTo">Similar To</option>
        </select>

        <button id="buscar">Search</button>

        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
